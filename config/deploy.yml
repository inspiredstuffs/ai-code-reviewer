# Base Kamal config for the AI Code Reviewer — shared across destinations.
# Per-env overrides (hosts + proxy/domain) live in config/deploy.<env>.yml and
# are loaded via `bin/kamal -d <env>`. Deploy structure mirrors juto/bin/kamal;
# runtime secret injection mirrors ayo-olopon (this service, unlike the juto SPA,
# has real secrets to hand the container).

<%
  ssh_user_raw = ENV['SSH_USER'].to_s.strip
  ssh_user     = ssh_user_raw.empty? ? 'deploy' : ssh_user_raw
%>

service: ai-code-reviewer
# Image excludes the registry host; Kamal prefixes it from the registry block.
image: <%= ENV.fetch('IMAGE') { raise 'IMAGE env required (ghcr namespace + name, e.g. <your-ghcr-namespace>/ai-code-reviewer)' } %>

ssh:
  user: <%= ssh_user %>

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# Build amd64 images from an arm64 Mac for the x86 Hetzner host.
builder:
  arch: amd64

env:
  secret:
    # Host selector + both providers' credentials, sourced from the shell via
    # secrets-common. REPO_PROVIDER picks the host (github|gitlab); one host per deploy,
    # so the other host's vars resolve empty and are unused. An unset REPO_PROVIDER
    # arrives as "" and the app defaults it to "github" (see selectRepositoryProvider).
    - REPO_PROVIDER
    - GITHUB_APP_ID
    - GITHUB_APP_PRIVATE_KEY
    - GITHUB_WEBHOOK_SECRET
    - REVIEWER_LOGIN
    - GITLAB_TOKEN
    - GITLAB_WEBHOOK_SECRET
    - CLAUDE_CODE_OAUTH_TOKEN
    - CODEX_HOME
    - CODEX_API_KEY
    - CODEX_ACCESS_TOKEN
  clear:
    # PORT and DATABASE_PATH are infra-coupled (proxy app_port / volume mount), so
    # they stay fixed. The rest are tunables an operator may override per-deploy via
    # .env.production; ERB falls back to these defaults when the var is unset.
    PORT: "3000"
    DATABASE_PATH: "/data/reviews.db"
    # GitLab API base (REPO_PROVIDER=gitlab); ignored by the GitHub provider.
    GITLAB_API_URL: <%= ENV.fetch('GITLAB_API_URL', 'https://gitlab.com') %>
    AI_PROVIDER: <%= ENV.fetch('AI_PROVIDER', 'claude') %>
    CLAUDE_MODEL: <%= ENV.fetch('CLAUDE_MODEL', 'claude-sonnet-4-6') %>
    CODEX_MODEL: <%= ENV.fetch('CODEX_MODEL', '') %>
    CODEX_PROFILE: <%= ENV.fetch('CODEX_PROFILE', '') %>
    BOT_NAME: <%= ENV.fetch('BOT_NAME', 'Alátùńwò AI') %>
    # Deep reviews clone the PR so the model can read surrounding files (read-only
    # tools). Off by default; set DEEP_REVIEW=true to enable. See README "Deep reviews".
    DEEP_REVIEW: <%= ENV.fetch('DEEP_REVIEW', 'false') %>
    DEEP_REVIEW_MAX_TURNS: <%= ENV.fetch('DEEP_REVIEW_MAX_TURNS', '8') %>

# Persist the SQLite review store across deploys. Without this the DB lives inside
# the container and every redeploy wipes the idempotency/audit history. The image
# creates /data node-owned (see Dockerfile) so the fresh named volume is writable.
volumes:
  - "ai_code_reviewer_data:/data"

# Hosts listed for legibility; the per-env file supplies the required array.
servers:
  web:
    hosts: <%= ENV.fetch('WEB_HOSTS', '').split(',').map(&:strip).reject(&:empty?) %>
